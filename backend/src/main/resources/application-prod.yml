spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_ADDRESS}
    password: ${MAIL_PASSWORD}

    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  frontend-url: ${SPRING_FRONTEND_URL}
  api-key: ${SPRING_API_KEY}

  cookie:
    secure: true
    same-site: None

server:
  servlet:
    session:
      cookie:
        same-site: none
        secure: true

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION}
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION}